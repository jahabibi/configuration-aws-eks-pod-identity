apiVersion: aws.platform.upbound.io/v1alpha1
kind: Identity
metadata:
  name: configuration-aws-eks-pod-identity
  namespace: default
spec:
  parameters:
    federationType: pod-identity
    region: us-west-2
    # Reference the cluster by platform id; the composition resolves its
    # published status (cluster name) via extra-resources.
    computeRef:
      id: my-compute
    # Curated role -> L3 policy template + default ServiceAccount.
    # For arbitrary IAM, set overrides.policy instead of role.
    role: ebs-csi
