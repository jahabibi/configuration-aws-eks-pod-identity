apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: identities.aws.platform.upbound.io
spec:
  group: aws.platform.upbound.io
  names:
    categories:
    - crossplane
    kind: Identity
    plural: identities
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    served: true
    schema:
      openAPIV3Schema:
        description: >-
          Identity grants a Kubernetes workload cloud permissions. The federation
          mechanism (EKS Pod Identity, IRSA) and the policy wiring are
          implementation details, not leaked API surface.
        type: object
        properties:
          spec:
            type: object
            properties:
              parameters:
                type: object
                description: Identity configuration parameters.
                properties:
                  federationType:
                    type: string
                    enum: [pod-identity, irsa]
                    default: pod-identity
                    description: >-
                      How the workload's ServiceAccount federates to the cloud
                      identity. Default pod-identity uses EKS Pod Identity; irsa is
                      an additive alternate path. The mechanism is owned by L3.
                  computeRef:
                    type: object
                    description: >-
                      Reference, by platform id, to the Compute (cluster) this
                      identity targets. Resolved in L3 from Compute's published
                      status — no Crossplane ref/selector machinery in the contract.
                    properties:
                      id:
                        type: string
                        description: Platform id of the Compute (its metadata name).
                    required:
                    - id
                  serviceAccount:
                    type: object
                    description: >-
                      The Kubernetes ServiceAccount granted the identity. Optional
                      when `role` is set (the role template supplies a default).
                    properties:
                      name:
                        type: string
                        description: ServiceAccount name.
                      namespace:
                        type: string
                        description: ServiceAccount namespace.
                  role:
                    type: string
                    enum: [aws-lb-controller, ebs-csi, external-dns, cert-manager, cluster-autoscaler]
                    description: >-
                      Selects a platform-curated permission set (an L3 policy
                      template) for a well-known workload, and a default
                      ServiceAccount. For arbitrary IAM, use overrides.policy.
                  reclaimPolicy:
                    type: string
                    enum: [Delete, Retain]
                    default: Delete
                    description: >-
                      Outcome intent (Kubernetes PersistentVolume vocabulary). The
                      mapping to Crossplane management policies is owned by the
                      composition; this field does not echo Crossplane machinery.
                  region:
                    type: string
                    description: Cloud region. Resolved from Compute when omitted.
                  overrides:
                    type: object
                    description: >-
                      Bounded escape hatch with an explicit support boundary. Use
                      overrides.policy for arbitrary IAM when no curated `role` fits.
                    properties:
                      policy:
                        type: string
                        description: >-
                          Raw IAM policy document (JSON). Unsupported edge cases
                          only — prefer a curated role.
                      managedPolicyArns:
                        type: array
                        items:
                          type: string
                        description: Managed policy ARNs to attach (escape hatch).
                      providerConfigName:
                        type: string
                        description: >-
                          Crossplane ProviderConfig for account/credential
                          selection. Defaults to "default".
                required:
                - computeRef
            required:
            - parameters
          status:
            type: object
            description: Identity status published for consumers.
            properties:
              roleArn:
                type: string
                description: ARN of the IAM role backing this identity.
              clusterName:
                type: string
              associationId:
                type: string
                description: EKS Pod Identity association id (pod-identity federation).
        required:
        - spec
        type: object
